<!-- Welcome Card -->
<div class="card shadow mb-4">
  <div class="card-body">
    <h4 class="card-title">Welcome, {{ userName }}! 👋</h4>
    <p class="text-muted">Role: <strong>{{ userRole }}</strong></p>
  </div>
</div>

<!-- Stats Cards -->
<div class="row g-3">
  <div class="col-md-4" *ngIf="isAdmin || isLibrarian">
    <div class="card text-white bg-primary shadow">
      <div class="card-body">
        <h5>📖 Total Books</h5>
        <h2>{{ totalBooks }}</h2>
      </div>
    </div>
  </div>

  <div class="col-md-4" *ngIf="isAdmin">
    <div class="card text-white bg-success shadow">
      <div class="card-body">
        <h5>👥 Total Members</h5>
        <h2>{{ totalMembers }}</h2>
      </div>
    </div>
  </div>

  <div class="col-md-4" *ngIf="isAdmin || isLibrarian">
    <div class="card text-white bg-warning shadow">
      <div class="card-body">
        <h5>📋 Borrow Records</h5>
        <h2>{{ totalBorrows }}</h2>
      </div>
    </div>
  </div>

  <div class="col-md-4" *ngIf="isMember">
    <div class="card text-white bg-info shadow">
      <div class="card-body">
        <h5>📜 My Borrows</h5>
        <h2>{{ myBorrows }}</h2>
      </div>
    </div>
  </div>
</div>
