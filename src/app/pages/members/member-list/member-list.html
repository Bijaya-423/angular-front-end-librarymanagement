<div class="d-flex">

  <app-sidebar></app-sidebar>

  <div class="content-area">

    <h2 class="mb-4">
      👥 Members List
    </h2>

    <table class="table table-bordered table-striped">

      <thead class="table-dark">

        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Role</th>
        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let member of members">

          <td>{{ member.id }}</td>

          <td>{{ member.name }}</td>

          <td>{{ member.email }}</td>

          <td>{{ member.phone }}</td>

          <td>{{ member.role }}</td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
